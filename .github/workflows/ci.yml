name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff
        run: ruff check src tests

  test:
    name: Test
    needs: lint
    uses: ./.github/workflows/reusable-test.yml
    with:
      python-version: "3.12"

  build:
    name: Build
    needs: test
    uses: ./.github/workflows/reusable-build.yml
    with:
      python-version: "3.12"
